services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scan
      POSTGRES_PASSWORD: scan
      POSTGRES_DB: scan_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://scan:scan@postgres:5432/scan_db
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    command: celery -A app.celery_app.celery_app worker -l info
    environment:
      DATABASE_URL: postgresql+psycopg2://scan:scan@postgres:5432/scan_db
      REDIS_URL: redis://redis:6379/0
      ARTIFACTS_DIR: /app/artifacts
      CORS_ORIGINS: http://localhost:5173
    volumes:
      - ./artifacts:/app/artifacts
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"

  # ==========================
  # MONITORING - DockerOpt
  # ==========================

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8080:8080"
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
      - node-exporter

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pg_data:
  prometheus_data:
  grafana_data: